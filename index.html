<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Ελατήριο - Ταλάντωση</title>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: sans-serif;
    }

    #controls {
      width: 260px;
      background: #e9e9e9;
      padding: 15px;
      box-sizing: border-box;
    }

    canvas {
      flex: 1;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    .value {
      font-weight: bold;
      margin-left: 5px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div id="controls">

  <h3>Ρυθμίσεις</h3>

  <!-- ΜΑΖΕΣ -->

  <label>
    Μάζα Σ1: <span id="m1v" class="value"></span>
  </label>
  <input id="m1" type="range" min="2" max="10" value="4">

  <label>
    Μάζα Σ2: <span id="m2v" class="value"></span>
  </label>
  <input id="m2" type="range" min="2" max="10" value="6">

  <!-- k -->

  <label>
    k: <span id="kv" class="value"></span>
  </label>
  <input id="k" type="range" min="20" max="200" value="80">

  <!-- F -->

  <label>
    F: <span id="Fv" class="value"></span>
  </label>
  <input id="F" type="range" min="0" max="80" value="0">

  <!-- BUTTONS -->

  <button onclick="startSim()">Έναρξη ταλάντωσης</button>
  <button onclick="resetSim()">Επαναφορά</button>
  <button onclick="togglePause()">Pause / Resume</button>

  <!-- CHECKBOX -->

  <label>
    <input id="forces" type="checkbox" checked>
    Εμφάνιση δυνάμεων
  </label>

  <!-- LEGEND -->

  <div style="margin-top:10px; font-size:14px;">

    <div style="color:blue;">↓ Βάρος (m·g)</div>
    <div style="color:green;">↑ Δύναμη ελατηρίου</div>
    <div style="color:orange;">↓ Εξωτερική δύναμη F</div>
    <div style="color:purple;">↑ Κανονική αντίδραση</div>

  </div>

</div>

<!-- ΤΟ JS ΣΤΟ ΤΕΛΟΣ (ΠΟΛΥ ΣΗΜΑΝΤΙΚΟ) -->
<script src="sketch.js"></script>

</body>
</html>
``
