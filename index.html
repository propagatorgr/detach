<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Ελατήριο</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: sans-serif;
}

#controls {
  width: 260px;
  background: #e9e9e9;
  padding: 10px;
}

canvas {
  flex: 1;
}

button {
  width: 100%;
  margin-top: 8px;
}
</style>

</head>

<body>

<div id="controls">

<h3>Ρυθμίσεις</h3>

Μάζα Σ1: <span id="m1v"></span><br>
<input id="m1" type="range" min="2" max="10" value="4">

Μάζα Σ2: <span id="m2v"></span><br>
<input id="m2" type="range" min="2" max="10" value="6">

k: <span id="kv"></span><br>
<input id="k" type="range" min="20" max="200" value="80">

F: <span id="Fv"></span><br>
<input id="F" type="range" min="0" max="100" value="0">

<button onclick="startSim()">Έναρξη</button>
<button onclick="resetSim()">Επαναφορά</button>
<button onclick="togglePause()">Pause</button>

<label>
<input id="forces" type="checkbox" checked>
Δυνάμεις
</label>

<br><br>
F = <span id="FvalBox"></span><br>
Fcrit = <span id="FcritBox"></span>

</div>

<script src="sketch.js"></script>

</body>
</html>
