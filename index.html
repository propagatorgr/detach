<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Ελατήριο</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: sans-serif;
}

#controls {
  width: 260px;
  background: #e9e9e9;
  padding: 10px;
  box-sizing: border-box;
}

canvas {
  flex: 1;
}

.control-block {
  margin-bottom: 10px;
}

.control-label {
  display: block;
}

button {
  width: 100%;
  margin-top: 8px;
}
</style>

</head>

<body>

<div id="controls">

<h3>Ρυθμίσεις</h3>

<div class="control-block">
  <div class="control-label">Μάζα Σ1: <span id="m1v"></span></div>
  <input id="m1" type="range" min="2" max="10" value="4">
</div>

<div class="control-block">
  <div class="control-label">Μάζα Σ2: <span id="m2v"></span></div>
  <input id="m2" type="range" min="2" max="10" value="6">
</div>

<div class="control-block">
  <div class="control-label">k: <span id="kv"></span></div>
  <input id="k" type="range" min="20" max="200" value="80">
</div>

<div class="control-block">
  <div class="control-label">F: <span id="Fv"></span></div>
  <input id="F" type="range" min="0" max="100" value="0">
</div>

<button onclick="startSim()">Έναρξη</button>
<button onclick="resetSim()">Επαναφορά</button>
<button onclick="togglePause()">Pause</button>

<label>
  <input id="forces" type="checkbox" checked>
  Δυνάμεις
</label>

<div style="margin-top:10px; font-size:14px;">
<div style="color:blue;">↓ Βάρος (mg)</div>
<div style="color:green;">↑ Δύναμη ελατηρίου</div>
<div style="color:orange;">↓ Δύναμη F</div>
<div style="color:purple;">↑ Κάθετη αντίδραση</div>
</div>

<br>

F = <span id="FvalBox"></span><br>
Fcrit = <span id="FcritBox"></span>

</div>

<script src="sketch.js"></script>

</body>
</html>
