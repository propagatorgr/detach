<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ελατήριο</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* ✅ FLEX LAYOUT */
.container {
  display: flex;
  height: 100vh;
}

/* ✅ PANEL */
#controls {
  width: 260px;
  background: #e9e9e9;
  padding: 10px;
  box-sizing: border-box;
  overflow-y: auto;
}

/* ✅ CANVAS */
#canvas-wrapper {
  flex: 1;
}

/* ✅ MOBILE */
@media (max-width: 700px) {

  .container {
    flex-direction: column;
  }

  #controls {
    width: 100%;
    height: auto;
  }

  #canvas-wrapper {
    height: 100%;
  }
}

button {
  width: 100%;
  margin-top: 8px;
}

label {
  display: block;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">

  <div id="controls">

    <h3>Ρυθμίσεις</h3>

    <label>Μάζα Σ1: <span id="m1v"></span></label>
    <input id="m1" type="range" min="2" max="10" value="4">

    <label>Μάζα Σ2: <span id="m2v"></span></label>
    <input id="m2" type="range" min="2" max="10" value="6">

    <label>k: <span id="kv"></span></label>
    <input id="k" type="range" min="20" max="200" value="80">

    <label>F: <span id="Fv"></span></label>
    <input id="F" type="range" min="0" max="100" value="0">

    <button onclick="startSim()">Έναρξη</button>
    <button onclick="resetSim()">Επαναφορά</button>
    <button onclick="togglePause()">Pause / Resume</button>

    <label>
      <input id="forces" type="checkbox" checked>
      Εμφάνιση δυνάμεων
    </label>

    <div style="margin-top:10px;font-size:14px">
      <div style="color:blue">↓ Βάρος</div>
      <div style="color:green">↑ Δύναμη ελατηρίου</div>
      <div style="color:orange">↓ F</div>
      <div style="color:purple">↑ Ν</div>
    </div>

    <div style="margin-top:10px">
      F = <span id="FvalBox"></span><br>
      Fcrit = <span id="FcritBox"></span>
    </div>

  </div>

  <div id="canvas-wrapper"></div>

</div>

<script src="sketch.js"></script>

</body>
</html>
``
